<!DOCTYPE html>
<html>
<head>
    <title>Create a Listing</title>
    <link rel="stylesheet" href="static/app.css">
</head>
<body class="app-layout">

    <div style="text-align: center; margin: 20px 0;">
        <h1 style="font-size: 40px; font-family: serif;">Create a Listing!</h1>
    </div>

    <form class="form-container" id="create-listing-form">

        <!-- LEFT SIDE -->
        <div style="flex: 1; display: flex; flex-direction: column; gap: 15px;">

            <div>
                <label>Date:</label><br>
                <input type="date" id="listing-date" required style="width: 100%;">
            </div>

            <div>
                <label>Category:</label><br>
                <select id="listing-category" required style="width: 100%; height: 40px;">
                    <option value="">-Select-</option>
                    <option>Accessories</option>
                    <option>Apparel</option>
                    <option>Books</option>
                    <option>Electronics</option>
                    <option>Other</option>
                </select>
            </div>

            <div>
                <label>Location:</label><br>
                <select id="listing-location" required style="width: 100%; height: 40px;">
                    <option value="">-Select-</option>
                    <option>Buley Library</option>
                    <option>Engleman Hall</option>
                    <option>Jennings Hall</option>
                    <option>Morrill Hall</option>
                    <option>Student Center</option>
                </select>
            </div>

            <div>
                <label>Description:</label><br>
                <textarea id="listing-description" required rows="4"
                    style="width: 100%; padding: 5px;"
                    placeholder="Color, brand, features..."></textarea>
            </div>

            <div style="display: flex; gap: 10px;">
                <button type="button"
                        onclick="location.href='/dashboard'"
                        style="background:#ccc; border:none; height:40px; width:100px;">
                    Cancel
                </button>

                <button type="submit"
                        style="background:#4CAF50; color:white; border:none; width:100px;">
                    Submit
                </button>
            </div>

        </div>

        <!-- RIGHT SIDE -->
        <div style="flex: 1; display: flex; flex-direction: column; gap: 15px;">

            <div>
                <label>Title:</label><br>
                <input type="text" id="listing-title" required
                       placeholder="e.g. Water Bottle"
                       style="width: 100%; height: 30px;">
            </div>

            <!-- IMAGE UPLOAD BOX (UPDATED) -->
            <div style="
                border: 2px dashed #aaa;
                flex: 1;
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #fafafa;
                cursor: pointer;
                position: relative;
                overflow: hidden;
            ">

                <!-- TEXT -->
                <span id="upload-text"
                      style="font-size: 20px; color: #888;">
                    Click to Upload
                </span>

                <!-- IMAGE PREVIEW -->
                <img id="image-preview"
                     style="
                        display: none;
                        width: 100%;
                        height: 100%;
                        object-fit: cover;
                        position: absolute;
                        top: 0;
                        left: 0;
                        border-radius: 10px;
                     " />

                <!-- FILE INPUT -->
                <input type="file"
                       id="listing-image"
                       name="image"
                       accept="image/*"
                       style="
                            opacity: 0;
                            position: absolute;
                            width: 100%;
                            height: 100%;
                            cursor: pointer;
                       ">

            </div>

        </div>

    </form>

    <script src="static/createlisting.js"></script>
</body>
</html>
