<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
   <link rel="stylesheet" href="static/auth.css">
</head>
<body>

<h2 style="font-size: 50px;">
    Lost 
    <img src="static/magnify glass.png" style="height: 70px; vertical-align: middle; margin: 0 -20px;"> 
    Found
</h2>

<div style="background: rgba(255, 255, 255, 0.9); padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; text-align: center;">
    <h3 style="font-size: 25px; margin-top: 0;">Reset Password</h3>
    
    <p id="forgot-error" style="color: red; font-size: 14px; font-weight: bold;"></p>

    <form id="forgot-step-1" onsubmit="handleForgotSubmit(event)">
        <p style="font-size: 14px; color: #555;">Enter your @southernct.edu email to receive a recovery code.</p>
        <input type="email" id="forgot-email" placeholder="School Email" required><br><br>
        <button style="font-size: 18px;" type="submit">Send Code</button>
    </form>

    <form id="forgot-step-2" onsubmit="handleForgotVerify(event)" style="display: none;">
        <p style="font-size: 14px; color: #555;">Enter the verification code sent to your email.</p>
        <input type="text" placeholder="Verification Code" required><br><br>
        <button style="font-size: 18px;" type="submit">Verify Code</button>
    </form>

    <form id="forgot-step-3" onsubmit="handleResetPassword(event)" style="display: none;">
        <p id="reset-error" style="color: red; font-size: 14px; font-weight: bold;"></p>
        <input type="password" id="new-password" placeholder="New Password" required><br><br>
        <input type="password" id="new-confirm" placeholder="Confirm Password" required><br><br>
        <button style="font-size: 18px;" type="submit">Update Password</button>
    </form>

    <p style="margin-top: 20px;">
        <a href="/">Back to Login</a>
    </p>
</div>

<script src="static/validation.js"></script>
<script src="static/forgotpassword.js"></script>
</body>
</html>
